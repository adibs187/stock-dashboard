<!--
✅ בדיקת חובה לפני קוד:
1. האם וידאתי ש־mode: 'no-cors' לא מופיע בכלל בקוד? כן.
2. האם אכפתי את מפתחות ה־payload המדויקים בלבד: tickers, startDate, endDate, frequency, action? כן.
-->

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מערכת חילוץ נתוני מניות</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(59, 130, 246, 0.28), transparent 32%),
        radial-gradient(circle at 85% 15%, rgba(168, 85, 247, 0.25), transparent 34%),
        radial-gradient(circle at 50% 85%, rgba(20, 184, 166, 0.22), transparent 34%),
        linear-gradient(135deg, #f8fafc 0%, #eef2ff 45%, #f0fdfa 100%);
    }

    .mesh {
      position: fixed;
      inset: 0;
      z-index: -3;
      background:
        radial-gradient(circle at 20% 30%, rgba(14, 165, 233, 0.22), transparent 28%),
        radial-gradient(circle at 80% 20%, rgba(124, 58, 237, 0.18), transparent 30%),
        radial-gradient(circle at 55% 75%, rgba(45, 212, 191, 0.18), transparent 28%);
      filter: blur(10px);
      animation: drift 18s ease-in-out infinite alternate;
    }

    @keyframes drift {
      0% {
        transform: scale(1) translate3d(0, 0, 0);
      }
      100% {
        transform: scale(1.12) translate3d(-35px, 25px, 0);
      }
    }

    .particle {
      position: fixed;
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.8);
      box-shadow: 0 0 26px rgba(59, 130, 246, 0.55);
      z-index: -2;
      animation: float 9s ease-in-out infinite;
    }

    .particle:nth-child(2) {
      top: 16%;
      right: 14%;
      animation-delay: -2s;
    }

    .particle:nth-child(3) {
      top: 72%;
      right: 9%;
      animation-delay: -5s;
    }

    .particle:nth-child(4) {
      top: 30%;
      left: 12%;
      animation-delay: -1s;
    }

    .particle:nth-child(5) {
      top: 78%;
      left: 18%;
      animation-delay: -7s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) scale(1);
        opacity: 0.55;
      }
      50% {
        transform: translateY(-34px) scale(1.35);
        opacity: 1;
      }
    }

    .premium-card {
      position: relative;
      overflow: hidden;
    }

    .premium-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(59,130,246,0.35), rgba(20,184,166,0.35));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .glow-button {
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .glow-button::before {
      content: "";
      position: absolute;
      inset: -80%;
      background: conic-gradient(from 0deg, transparent, rgba(255,255,255,0.9), transparent, rgba(45,212,191,0.8), transparent);
      animation: rotateGlow 3.8s linear infinite;
      z-index: -2;
    }

    .glow-button::after {
      content: "";
      position: absolute;
      inset: 2px;
      border-radius: inherit;
      background: linear-gradient(135deg, #2563eb, #7c3aed, #0f766e);
      z-index: -1;
    }

    @keyframes rotateGlow {
      to {
        transform: rotate(360deg);
      }
    }

    .loader-ring {
      width: 54px;
      height: 54px;
      border-radius: 999px;
      border: 4px solid rgba(59, 130, 246, 0.18);
      border-top-color: #2563eb;
      border-left-color: #14b8a6;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .fade-in {
      animation: fadeIn 0.45s ease both;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    input,
    select {
      outline: none;
    }

    input:focus,
    select:focus {
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
      border-color: rgba(37, 99, 235, 0.65);
    }
  </style>
</head>

<body class="text-slate-900">
  <div class="mesh"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>

  <main class="min-h-screen px-4 py-10 sm:px-6 lg:px-8 flex items-center justify-center">
    <section class="premium-card w-full max-w-6xl backdrop-blur-xl bg-white/80 shadow-2xl rounded-[2rem] p-6 sm:p-8 lg:p-10">
      <header class="mb-8">
        <div class="inline-flex items-center gap-2 rounded-full border border-blue-200 bg-blue-50/80 px-4 py-2 text-sm font-bold text-blue-700 shadow-sm">
          <span class="h-2 w-2 rounded-full bg-emerald-400 shadow-[0_0_14px_rgba(52,211,153,0.95)]"></span>
          מערכת פיננסית חכמה
        </div>

        <h1 class="mt-5 text-4xl sm:text-5xl font-black tracking-tight bg-gradient-to-l from-blue-700 via-violet-700 to-teal-700 bg-clip-text text-transparent">
          חילוץ שערי סגירה למניות
        </h1>

        <p class="mt-4 max-w-4xl text-lg leading-8 text-slate-600">
          ברוכים הבאים למערכת חילוץ הנתונים. כאן תוכלו לשלוף שערי סגירה למספר מניות במקביל, להשוות ביניהן בסדרות-זמן, ולייצא בקליק.
        </p>
      </header>

      <form id="stockForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
        <div class="lg:col-span-2">
          <label for="tickers" class="mb-2 block text-sm font-extrabold text-slate-700">סימולי מניות</label>
          <input
            id="tickers"
            type="text"
            placeholder="לדוגמה: AAPL, MSFT, TSLA"
            class="w-full rounded-2xl border border-slate-200 bg-white/80 px-5 py-4 text-slate-900 shadow-inner transition"
          />
          <p class="mt-2 text-sm text-slate-500">הזן סימולי מניות, מופרדים בפסיק</p>
        </div>

        <div>
          <label for="startDate" class="mb-2 block text-sm font-extrabold text-slate-700">תאריך התחלה</label>
          <input
            id="startDate"
            type="date"
            class="w-full rounded-2xl border border-slate-200 bg-white/80 px-5 py-4 text-slate-900 shadow-inner transition"
          />
        </div>

        <div>
          <label for="endDate" class="mb-2 block text-sm font-extrabold text-slate-700">תאריך סיום</label>
          <input
            id="endDate"
            type="date"
            class="w-full rounded-2xl border border-slate-200 bg-white/80 px-5 py-4 text-slate-900 shadow-inner transition"
          />
        </div>

        <div class="md:col-span-2 lg:col-span-4">
          <label for="frequency" class="mb-2 block text-sm font-extrabold text-slate-700">תדירות</label>
          <select
            id="frequency"
            class="w-full rounded-2xl border border-slate-200 bg-white/80 px-5 py-4 text-slate-900 shadow-inner transition"
          >
            <option value="daily">daily</option>
            <option value="weekly">weekly</option>
            <option value="monthly">monthly</option>
          </select>
        </div>

        <div class="md:col-span-2 lg:col-span-4 pt-2">
          <button
            id="loadBtn"
            type="submit"
            class="glow-button w-full rounded-2xl px-8 py-4 text-lg font-black text-white shadow-2xl transition hover:scale-[1.01] active:scale-[0.99]"
          >
            טען נתונים
          </button>
        </div>
      </form>

      <div id="messageArea" class="mt-7"></div>

      <div id="previewTable" class="mt-8"></div>

      <div id="exportActions" class="hidden mt-7 grid grid-cols-1 sm:grid-cols-2 gap-4">
        <button
          id="downloadCsvBtn"
          type="button"
          class="rounded-2xl bg-slate-950 px-6 py-4 font-black text-white shadow-xl transition hover:-translate-y-1 hover:shadow-2xl"
        >
          הורד כ-CSV
        </button>

        <button
          id="exportSheetBtn"
          type="button"
          class="rounded-2xl bg-gradient-to-l from-emerald-600 to-teal-600 px-6 py-4 font-black text-white shadow-xl transition hover:-translate-y-1 hover:shadow-2xl"
        >
          ייצא ל-Google Sheets
        </button>
      </div>
    </section>
  </main>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwQ2-uZsyB7_4A6t-z0p14rzaUzY-XnAsIOvl7cRYDpsykD6zytMHnHwXUsz-zSXyG3Dg/exec';

    let csvData = '';

    const form = document.getElementById('stockForm');
    const messageArea = document.getElementById('messageArea');
    const previewTable = document.getElementById('previewTable');
    const exportActions = document.getElementById('exportActions');
    const loadBtn = document.getElementById('loadBtn');
    const downloadCsvBtn = document.getElementById('downloadCsvBtn');
    const exportSheetBtn = document.getElementById('exportSheetBtn');

    function showError(message) {
      messageArea.innerHTML = `
        <div class="fade-in rounded-3xl border border-rose-200 bg-rose-50/90 p-5 shadow-lg">
          <div class="flex items-start gap-4">
            <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl bg-rose-100 text-2xl">!</div>
            <div>
              <h3 class="font-black text-rose-700">אופס! משהו דורש תיקון</h3>
              <p class="mt-1 text-rose-700">${message}</p>
            </div>
          </div>
        </div>
      `;
    }

    function showSuccess(message, linkUrl) {
      messageArea.innerHTML = `
        <div class="fade-in rounded-3xl border border-emerald-200 bg-emerald-50/90 p-5 shadow-lg">
          <div class="flex items-start gap-4">
            <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl bg-emerald-100 text-2xl">✓</div>
            <div>
              <h3 class="font-black text-emerald-800">הפעולה הושלמה בהצלחה</h3>
              <p class="mt-1 text-emerald-700">${message}</p>
              ${linkUrl ? `<a href="${linkUrl}" target="_blank" rel="noopener noreferrer" class="mt-4 inline-flex rounded-2xl bg-emerald-600 px-5 py-3 font-black text-white shadow-lg transition hover:bg-emerald-700">פתח את הגיליון</a>` : ''}
            </div>
          </div>
        </div>
      `;
    }

    function showLoader(text) {
      messageArea.innerHTML = `
        <div class="fade-in rounded-3xl border border-blue-200 bg-white/70 p-6 shadow-xl backdrop-blur-xl">
          <div class="flex flex-col items-center justify-center gap-4 text-center sm:flex-row">
            <div class="loader-ring"></div>
            <div>
              <h3 class="text-xl font-black text-slate-800">${text}</h3>
              <p class="mt-1 text-slate-500">רגע קטן, המערכת מעבדת את הבקשה...</p>
            </div>
          </div>
        </div>
      `;
    }

    function clearMessages() {
      messageArea.innerHTML = '';
    }

    function validateForm() {
      const tickers = document.getElementById('tickers').value.trim();
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;

      if (!tickers) {
        showError('יש להזין לפחות סימול מניה אחד לפני טעינת הנתונים.');
        return false;
      }

      if (!startDate || !endDate) {
        showError('יש לבחור גם תאריך התחלה וגם תאריך סיום.');
        return false;
      }

      if (new Date(startDate) > new Date(endDate)) {
        showError('נראה שתאריך ההתחלה מאוחר מתאריך הסיום. יש לבחור טווח תאריכים תקין.');
        return false;
      }

      return true;
    }

    function parseCsv(csvText) {
      return csvText
        .trim()
        .split(/\r?\n/)
        .map(row => row.split(',').map(cell => cell.trim()));
    }

    function buildPreviewTable(csvText) {
      const rows = parseCsv(csvText);

      if (!rows.length || !rows[0].length) {
        previewTable.innerHTML = `
          <div class="rounded-3xl border border-amber-200 bg-amber-50/90 p-5 text-amber-800 shadow-lg">
            לא נמצאו נתונים להצגה.
          </div>
        `;
        return;
      }

      const headers = rows[0];
      const bodyRows = rows.slice(1, 7);

      previewTable.innerHTML = `
        <div class="fade-in overflow-hidden rounded-3xl border border-slate-200 bg-white/85 shadow-2xl backdrop-blur-xl">
          <div class="flex flex-col gap-2 border-b border-slate-200 bg-gradient-to-l from-slate-950 via-blue-950 to-teal-900 p-5 text-white sm:flex-row sm:items-center sm:justify-between">
            <div>
              <h2 class="text-2xl font-black">תצוגה מקדימה</h2>
              <p class="mt-1 text-sm text-blue-100">מוצגות עד 6 השורות הראשונות מתוך הנתונים שהתקבלו</p>
            </div>
            <div class="rounded-full bg-white/15 px-4 py-2 text-sm font-bold backdrop-blur">
              ${Math.max(rows.length - 1, 0)} רשומות
            </div>
          </div>

          <div class="overflow-x-auto">
            <table class="w-full min-w-[760px] border-collapse text-right">
              <thead>
                <tr class="bg-slate-100/90">
                  ${headers.map(header => `
                    <th class="border-b border-slate-200 px-5 py-4 text-sm font-black text-slate-700">
                      ${header || '-'}
                    </th>
                  `).join('')}
                </tr>
              </thead>
              <tbody>
                ${bodyRows.map((row, index) => `
                  <tr class="${index % 2 === 0 ? 'bg-white/75' : 'bg-slate-50/75'} transition hover:bg-blue-50/80">
                    ${headers.map((_, cellIndex) => `
                      <td class="border-b border-slate-100 px-5 py-4 text-sm font-semibold text-slate-700">
                        ${row[cellIndex] || '-'}
                      </td>
                    `).join('')}
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    async function fetchStockData(actionValue) {
      const payload = {
        tickers: document.getElementById('tickers').value,
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value,
        frequency: document.getElementById('frequency').value,
        action: actionValue
      };

      const response = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: {'Content-Type': 'text/plain;charset=utf-8'},
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        throw new Error('השרת החזיר שגיאה.');
      }

      return response.json();
    }

    form.addEventListener('submit', async function (event) {
      event.preventDefault();

      previewTable.innerHTML = '';
      exportActions.classList.add('hidden');

      if (!validateForm()) {
        return;
      }

      showLoader('מושך נתוני שוק...');
      loadBtn.disabled = true;
      loadBtn.classList.add('opacity-70', 'cursor-not-allowed');

      try {
        const payload = {
          tickers: document.getElementById('tickers').value,
          startDate: document.getElementById('startDate').value,
          endDate: document.getElementById('endDate').value,
          frequency: document.getElementById('frequency').value,
          action: 'csv'
        };

        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: {'Content-Type': 'text/plain;charset=utf-8'},
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error('השרת החזיר שגיאה.');
        }

        const result = await response.json();

        csvData = result.csvData || result.csv || result.data || '';

        if (!csvData) {
          throw new Error('לא התקבלו נתוני CSV מהשרת.');
        }

        clearMessages();
        buildPreviewTable(csvData);
        exportActions.classList.remove('hidden');
      } catch (error) {
        showError(error.message || 'לא הצלחנו לטעון את הנתונים. נסה שוב בעוד רגע.');
      } finally {
        loadBtn.disabled = false;
        loadBtn.classList.remove('opacity-70', 'cursor-not-allowed');
      }
    });

    downloadCsvBtn.addEventListener('click', function () {
      if (!csvData) {
        showError('אין עדיין נתונים להורדה. יש לטעון נתונים קודם.');
        return;
      }

      const blob = new Blob([csvData], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');

      link.href = url;
      link.download = 'stock-data.csv';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      URL.revokeObjectURL(url);
    });

    exportSheetBtn.addEventListener('click', async function () {
      if (!validateForm()) {
        return;
      }

      showLoader('מייצא ל-Google Sheets...');
      exportSheetBtn.disabled = true;
      exportSheetBtn.classList.add('opacity-70', 'cursor-not-allowed');

      try {
        const payload = {
          tickers: document.getElementById('tickers').value,
          startDate: document.getElementById('startDate').value,
          endDate: document.getElementById('endDate').value,
          frequency: document.getElementById('frequency').value,
          action: 'sheet'
        };

        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: {'Content-Type': 'text/plain;charset=utf-8'},
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error('השרת החזיר שגיאה.');
        }

        const result = await response.json();
        const sheetUrl = result.sheetUrl || result.url || '';

        if (!sheetUrl) {
          throw new Error('הייצוא הצליח, אך לא התקבל קישור לגיליון.');
        }

        showSuccess('הנתונים יוצאו בהצלחה לגיליון חדש.', sheetUrl);
      } catch (error) {
        showError(error.message || 'לא הצלחנו לייצא את הנתונים ל-Google Sheets.');
      } finally {
        exportSheetBtn.disabled = false;
        exportSheetBtn.classList.remove('opacity-70', 'cursor-not-allowed');
      }
    });
  </script>
</body>
</html>
