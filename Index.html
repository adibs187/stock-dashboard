<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <!--
    CHECKLIST - בדיקת כשלים קריטיים:
    1. האם וידאתי ש־mode: 'no-cors' הושמט לחלוטין? כן.
    2. האם אכפתי את מפתחות ה־payload המדויקים: tickers, startDate, endDate, frequency, action? כן.
    3. האם הסרתי Google Fonts? כן.
    4. האם הסרתי Tailwind CDN? כן.
    5. האם הקובץ עובד כ־HTML + CSS + Vanilla JS בלבד? כן.
    6. האם fetch משתמש ב־Content-Type: text/plain;charset=utf-8? כן.
    7. האם יש טיפול בתגובה שאינה JSON תקין? כן.
    8. האם יש הודעה ברורה במקרה של חסימת CORS / Failed to fetch? כן.
  -->

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מערכת חילוץ נתוני מניות</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      direction: rtl;
      overflow-x: hidden;
      color: #0f172a;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 10% 20%, rgba(34, 211, 238, 0.25), transparent 34%),
        radial-gradient(circle at 85% 12%, rgba(99, 102, 241, 0.32), transparent 33%),
        radial-gradient(circle at 40% 90%, rgba(16, 185, 129, 0.22), transparent 38%),
        linear-gradient(135deg, #020617 0%, #0f172a 45%, #111827 100%);
    }

    .mesh-layer {
      position: fixed;
      inset: -35%;
      z-index: 0;
      background:
        radial-gradient(circle at 30% 30%, rgba(45, 212, 191, 0.18), transparent 26%),
        radial-gradient(circle at 70% 40%, rgba(59, 130, 246, 0.18), transparent 30%),
        radial-gradient(circle at 45% 75%, rgba(168, 85, 247, 0.16), transparent 28%);
      filter: blur(36px);
      animation: meshMove 20s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes meshMove {
      0% {
        transform: translate3d(-4%, 2%, 0) scale(1);
      }

      100% {
        transform: translate3d(5%, -5%, 0) scale(1.08);
      }
    }

    .particle {
      position: fixed;
      z-index: 1;
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.45);
      box-shadow:
        0 0 20px rgba(125, 211, 252, 0.95),
        0 0 45px rgba(45, 212, 191, 0.55);
      animation: floatParticle linear infinite;
      pointer-events: none;
    }

    @keyframes floatParticle {
      from {
        transform: translateY(115vh) translateX(0) scale(0.85);
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      75% {
        opacity: 1;
      }

      to {
        transform: translateY(-18vh) translateX(85px) scale(1.15);
        opacity: 0;
      }
    }

    .page {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 1150px;
      border-radius: 32px;
      padding: 28px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow:
        0 28px 90px rgba(15, 23, 42, 0.38),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      isolation: isolate;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -1px;
      z-index: -1;
      border-radius: 33px;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.9),
        rgba(34, 211, 238, 0.42),
        rgba(129, 140, 248, 0.42),
        rgba(16, 185, 129, 0.28)
      );
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 9px 16px;
      background: rgba(15, 23, 42, 0.94);
      color: #cffafe;
      font-size: 14px;
      font-weight: 900;
      box-shadow: 0 14px 35px rgba(15, 23, 42, 0.28);
    }

    .badge-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #34d399;
      box-shadow: 0 0 18px rgba(52, 211, 153, 1);
    }

    h1 {
      margin: 24px 0 0;
      font-size: clamp(38px, 6vw, 72px);
      line-height: 1.02;
      letter-spacing: -1px;
      font-weight: 1000;
      color: #020617;
    }

    .gradient-title {
      display: block;
      background: linear-gradient(270deg, #06b6d4, #2563eb, #7c3aed);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .intro {
      max-width: 880px;
      margin: 20px 0 34px;
      color: #475569;
      font-size: 18px;
      line-height: 1.8;
      font-weight: 500;
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      color: #1e293b;
      font-size: 14px;
      font-weight: 900;
    }

    .input-shell {
      position: relative;
      border-radius: 18px;
    }

    input,
    select {
      position: relative;
      width: 100%;
      height: 52px;
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 18px;
      outline: none;
      padding: 0 16px;
      color: #020617;
      background: rgba(255, 255, 255, 0.82);
      box-shadow:
        inset 0 2px 8px rgba(15, 23, 42, 0.06),
        0 8px 22px rgba(15, 23, 42, 0.04);
      font: inherit;
      font-weight: 700;
      transition: border 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus,
    select:focus {
      border-color: #22d3ee;
      box-shadow:
        0 0 0 4px rgba(103, 232, 249, 0.32),
        inset 0 2px 8px rgba(15, 23, 42, 0.04);
    }

    .helper {
      margin: 8px 0 0;
      color: #64748b;
      font-size: 12px;
      font-weight: 800;
    }

    .main-button {
      position: relative;
      width: 100%;
      border: 0;
      border-radius: 20px;
      padding: 18px 28px;
      cursor: pointer;
      overflow: hidden;
      color: white;
      background: linear-gradient(270deg, #06b6d4, #2563eb, #7c3aed);
      font-size: 19px;
      font-weight: 1000;
      box-shadow:
        0 20px 50px rgba(37, 99, 235, 0.36),
        0 8px 24px rgba(20, 184, 166, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.35);
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    .main-button:hover {
      transform: scale(1.01);
      filter: saturate(1.1);
    }

    .main-button:active {
      transform: scale(0.99);
    }

    .main-button::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.48), transparent);
      transform: translateX(130%);
      animation: shimmer 2.8s infinite;
    }

    @keyframes shimmer {
      0% {
        transform: translateX(130%);
      }

      55%,
      100% {
        transform: translateX(-130%);
      }
    }

    #messageArea {
      margin-top: 28px;
    }

    #previewTable {
      margin-top: 32px;
    }

    .alert {
      border-radius: 28px;
      padding: 22px;
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.14);
      border: 1px solid;
    }

    .alert-row {
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .alert-icon {
      flex: 0 0 auto;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      color: white;
      font-size: 22px;
      font-weight: 1000;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.16);
    }

    .alert h2 {
      margin: 0;
      font-size: 19px;
      font-weight: 1000;
    }

    .alert p {
      margin: 6px 0 0;
      line-height: 1.7;
      font-weight: 650;
    }

    .alert-error {
      background: rgba(255, 241, 242, 0.92);
      border-color: #fecdd3;
    }

    .alert-error .alert-icon {
      background: #f43f5e;
    }

    .alert-error h2 {
      color: #881337;
    }

    .alert-error p {
      color: #9f1239;
    }

    .alert-success {
      background: rgba(236, 253, 245, 0.92);
      border-color: #a7f3d0;
    }

    .alert-success .alert-icon {
      background: #10b981;
    }

    .alert-success h2 {
      color: #064e3b;
    }

    .alert-success p {
      color: #047857;
    }

    .loader-card {
      border-radius: 28px;
      padding: 26px;
      border: 1px solid rgba(165, 243, 252, 0.85);
      background: rgba(236, 254, 255, 0.9);
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.14);
    }

    .loader-content {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      text-align: right;
    }

    .loader-orbit {
      width: 64px;
      height: 64px;
      border-radius: 999px;
      border: 4px solid rgba(14, 165, 233, 0.14);
      border-top-color: #06b6d4;
      border-left-color: #10b981;
      border-bottom-color: #6366f1;
      animation: spin 0.9s linear infinite;
      box-shadow:
        0 0 26px rgba(14, 165, 233, 0.35),
        inset 0 0 24px rgba(16, 185, 129, 0.16);
      flex: 0 0 auto;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loader-title {
      margin: 0;
      color: #020617;
      font-size: 21px;
      font-weight: 1000;
    }

    .loader-text {
      margin: 5px 0 0;
      color: #475569;
      font-size: 14px;
      font-weight: 800;
    }

    .table-card {
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.75);
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.18);
    }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 22px;
      border-bottom: 1px solid #e2e8f0;
      background: rgba(255, 255, 255, 0.78);
    }

    .table-header h2 {
      margin: 0;
      color: #020617;
      font-size: 26px;
      font-weight: 1000;
    }

    .table-header p {
      margin: 4px 0 0;
      color: #64748b;
      font-size: 14px;
      font-weight: 800;
    }

    .rows-pill {
      border-radius: 999px;
      background: #cffafe;
      color: #155e75;
      padding: 9px 15px;
      font-size: 14px;
      font-weight: 1000;
      white-space: nowrap;
      box-shadow: inset 0 1px 8px rgba(14, 116, 144, 0.08);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 720px;
      border-collapse: collapse;
    }

    th {
      padding: 16px 20px;
      text-align: right;
      border-bottom: 1px solid #e2e8f0;
      background: #020617;
      color: #cffafe;
      font-size: 14px;
      font-weight: 1000;
      white-space: nowrap;
    }

    td {
      padding: 16px 20px;
      border-bottom: 1px solid #f1f5f9;
      color: #334155;
      font-size: 14px;
      font-weight: 750;
      white-space: nowrap;
    }

    td:first-child {
      color: #020617;
      font-weight: 950;
    }

    tbody tr:nth-child(odd) {
      background: rgba(255, 255, 255, 0.76);
    }

    tbody tr:nth-child(even) {
      background: rgba(248, 250, 252, 0.76);
    }

    tbody tr:hover {
      background: rgba(236, 254, 255, 0.92);
    }

    #exportActions {
      margin-top: 28px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    #exportActions.hidden {
      display: none;
    }

    .export-button {
      border: 0;
      border-radius: 20px;
      padding: 17px 24px;
      cursor: pointer;
      color: white;
      font-size: 16px;
      font-weight: 1000;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.18);
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    .export-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    .export-button:active {
      transform: translateY(0);
    }

    .csv-button {
      background: #020617;
    }

    .sheet-button {
      background: linear-gradient(270deg, #10b981, #0f766e);
    }

    .sheet-success-card {
      border-radius: 28px;
      border: 1px solid #a7f3d0;
      background: linear-gradient(270deg, rgba(236, 253, 245, 0.94), rgba(240, 253, 250, 0.94));
      padding: 26px;
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.14);
    }

    .sheet-success-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .sheet-success-card h2 {
      margin: 0;
      color: #064e3b;
      font-size: 26px;
      font-weight: 1000;
    }

    .sheet-success-card p {
      margin: 6px 0 0;
      color: #047857;
      font-weight: 700;
    }

    .sheet-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 18px;
      padding: 13px 22px;
      background: #059669;
      color: white;
      text-decoration: none;
      font-weight: 1000;
      box-shadow: 0 14px 30px rgba(5, 150, 105, 0.26);
      white-space: nowrap;
      transition: background 0.18s ease, transform 0.18s ease;
    }

    .sheet-link:hover {
      background: #047857;
      transform: translateY(-2px);
    }

    @media (max-width: 950px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .card {
        padding: 24px;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 18px 12px;
      }

      .card {
        padding: 20px;
        border-radius: 26px;
      }

      .grid,
      #exportActions {
        grid-template-columns: 1fr;
      }

      .loader-content,
      .sheet-success-content,
      .table-header {
        flex-direction: column;
        align-items: stretch;
        text-align: center;
      }

      .loader-orbit {
        margin: 0 auto;
      }

      .rows-pill {
        align-self: center;
      }

      h1 {
        font-size: 38px;
      }

      .intro {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="mesh-layer"></div>

  <div class="particle" style="left: 5%; animation-duration: 15s; animation-delay: -2s;"></div>
  <div class="particle" style="left: 14%; animation-duration: 22s; animation-delay: -11s;"></div>
  <div class="particle" style="left: 24%; animation-duration: 18s; animation-delay: -7s;"></div>
  <div class="particle" style="left: 39%; animation-duration: 20s; animation-delay: -4s;"></div>
  <div class="particle" style="left: 52%; animation-duration: 16s; animation-delay: -12s;"></div>
  <div class="particle" style="left: 68%; animation-duration: 24s; animation-delay: -9s;"></div>
  <div class="particle" style="left: 81%; animation-duration: 19s; animation-delay: -5s;"></div>
  <div class="particle" style="left: 93%; animation-duration: 17s; animation-delay: -13s;"></div>

  <main class="page">
    <section class="card">
      <header>
        <div class="badge">
          <span class="badge-dot"></span>
          <span>מסוף נתונים פיננסי</span>
        </div>

        <h1>
          חילוץ שערי סגירה
          <span class="gradient-title">למניות בזמן אמת</span>
        </h1>

        <p class="intro">
          ברוכים הבאים למערכת חילוץ הנתונים. כאן תוכלו לשלוף שערי סגירה למספר מניות במקביל, להשוות ביניהן בסדרות-זמן, ולייצא בקליק.
        </p>
      </header>

      <form id="stockForm" class="form">
        <div class="grid">
          <div class="field">
            <label for="tickers">סימולי מניות</label>
            <div class="input-shell">
              <input id="tickers" type="text" placeholder="AAPL, MSFT, NVDA" />
            </div>
            <p class="helper">הזן סימולי מניות, מופרדים בפסיק</p>
          </div>

          <div class="field">
            <label for="startDate">תאריך התחלה</label>
            <div class="input-shell">
              <input id="startDate" type="date" />
            </div>
          </div>

          <div class="field">
            <label for="endDate">תאריך סיום</label>
            <div class="input-shell">
              <input id="endDate" type="date" />
            </div>
          </div>

          <div class="field">
            <label for="frequency">תדירות</label>
            <div class="input-shell">
              <select id="frequency">
                <option value="daily">יומי</option>
                <option value="weekly">שבועי</option>
                <option value="monthly">חודשי</option>
              </select>
            </div>
          </div>
        </div>

        <button id="loadBtn" type="submit" class="main-button">
          טען נתונים
        </button>
      </form>

      <div id="messageArea"></div>

      <div id="previewTable"></div>

      <div id="exportActions" class="hidden">
        <button id="downloadCsvBtn" type="button" class="export-button csv-button">
          הורד כ-CSV
        </button>

        <button id="exportSheetBtn" type="button" class="export-button sheet-button">
          ייצא ל-Google Sheets
        </button>
      </div>
    </section>
  </main>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzYRHYZEbLLcBqWS-MvcEqwLXQHqEassQiRAyB96hobL1vvmFPprpk8RtN2P3XzEHGq/exec";

    let globalCsvData = "";

    const form = document.getElementById("stockForm");
    const messageArea = document.getElementById("messageArea");
    const previewTable = document.getElementById("previewTable");
    const exportActions = document.getElementById("exportActions");
    const downloadCsvBtn = document.getElementById("downloadCsvBtn");
    const exportSheetBtn = document.getElementById("exportSheetBtn");

    form.addEventListener("submit", async function (event) {
      event.preventDefault();

      clearOutput();

      const validationMessage = validateForm();

      if (validationMessage) {
        showError(validationMessage);
        return;
      }

      showLoader("מושך נתוני שוק...");

      const payload = {
        tickers: document.getElementById('tickers').value,
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value,
        frequency: document.getElementById('frequency').value,
        action: 'csv'
      };

      try {
        const result = await postToAppsScript(payload);

        if (result.status !== "success") {
          throw new Error(result.message || "אירעה שגיאה לא ידועה");
        }

        globalCsvData = result.csvData || "";

        if (!globalCsvData) {
          throw new Error("לא התקבלו נתונים להצגה");
        }

        showSuccess("הנתונים נטענו בהצלחה. אפשר לצפות בתצוגה המקדימה או לייצא את הקובץ.");
        buildPreviewTable(globalCsvData);
        exportActions.classList.remove("hidden");

      } catch (error) {
        showError(error.message);
      }
    });

    downloadCsvBtn.addEventListener("click", function () {
      if (!globalCsvData) {
        showError("אין נתונים זמינים להורדה.");
        return;
      }

      const blob = new Blob([globalCsvData], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);

      const link = document.createElement("a");
      link.href = url;
      link.download = "stock_prices.csv";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      URL.revokeObjectURL(url);
    });

    exportSheetBtn.addEventListener("click", async function () {
      const validationMessage = validateForm();

      if (validationMessage) {
        showError(validationMessage);
        return;
      }

      showLoader("יוצר גיליון Google Sheets...");

      const payload = {
        tickers: document.getElementById('tickers').value,
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value,
        frequency: document.getElementById('frequency').value,
        action: 'sheet'
      };

      try {
        const result = await postToAppsScript(payload);

        if (result.status !== "success") {
          throw new Error(result.message || "אירעה שגיאה לא ידועה");
        }

        if (!result.sheetUrl) {
          throw new Error("השרת לא החזיר קישור לגיליון.");
        }

        showSheetSuccess(result.sheetUrl);

      } catch (error) {
        showError(error.message);
      }
    });

    async function postToAppsScript(payload) {
      let response;

      try {
        response = await fetch(WEB_APP_URL, {
          method: 'POST',
          headers: {'Content-Type': 'text/plain;charset=utf-8'},
          body: JSON.stringify(payload)
        });
      } catch (error) {
        throw new Error(
          "אופס! הדפדפן לא הצליח להתחבר ל־Google Apps Script. " +
          "אם אתה מריץ את האתר מדומיין אחר, ייתכן שזו חסימת CORS. " +
          "בדוק שה־Web App פורסם עם גישה ל־Anyone, ונסה לפתוח את הקישור של הסקריפט ישירות בדפדפן."
        );
      }

      let text = "";

      try {
        text = await response.text();
      } catch (error) {
        throw new Error("התקבלה תגובה מהשרת, אבל לא ניתן היה לקרוא אותה.");
      }

      if (!response.ok) {
        throw new Error("השרת החזיר שגיאה: " + response.status + ". " + text.slice(0, 160));
      }

      if (!text || !text.trim()) {
        throw new Error("השרת החזיר תגובה ריקה.");
      }

      try {
        return JSON.parse(text);
      } catch (error) {
        throw new Error(
          "השרת לא החזיר JSON תקין. ייתכן שהתקבלה שגיאת הרשאות או דף HTML במקום נתונים. תחילת התגובה: " +
          text.slice(0, 180)
        );
      }
    }

    function validateForm() {
      const tickers = document.getElementById("tickers").value.trim();
      const startDate = document.getElementById("startDate").value;
      const endDate = document.getElementById("endDate").value;

      if (!tickers) {
        return "אופס! צריך להזין לפחות סימול מניה אחד.";
      }

      if (!startDate || !endDate) {
        return "אופס! צריך לבחור גם תאריך התחלה וגם תאריך סיום.";
      }

      if (new Date(startDate) > new Date(endDate)) {
        return "אופס! נראה שתאריך ההתחלה מאוחר מתאריך הסיום. כדאי להפוך ביניהם ולנסות שוב.";
      }

      return "";
    }

    function clearOutput() {
      messageArea.innerHTML = "";
      previewTable.innerHTML = "";
      exportActions.classList.add("hidden");
    }

    function showLoader(text) {
      messageArea.innerHTML = `
        <div class="loader-card">
          <div class="loader-content">
            <div class="loader-orbit"></div>
            <div>
              <h2 class="loader-title">${escapeHtml(text)}</h2>
              <p class="loader-text">המערכת מרכזת נתונים, מסדרת תאריכים ומכינה טבלה חכמה.</p>
            </div>
          </div>
        </div>
      `;
    }

    function showError(message) {
      messageArea.innerHTML = `
        <div class="alert alert-error">
          <div class="alert-row">
            <div class="alert-icon">!</div>
            <div>
              <h2>שגיאה קטנה בדרך</h2>
              <p>${escapeHtml(message)}</p>
            </div>
          </div>
        </div>
      `;
    }

    function showSuccess(message) {
      messageArea.innerHTML = `
        <div class="alert alert-success">
          <div class="alert-row">
            <div class="alert-icon">✓</div>
            <div>
              <h2>הצלחה</h2>
              <p>${escapeHtml(message)}</p>
            </div>
          </div>
        </div>
      `;
    }

    function showSheetSuccess(sheetUrl) {
      messageArea.innerHTML = `
        <div class="sheet-success-card">
          <div class="sheet-success-content">
            <div>
              <h2>הגיליון נוצר בהצלחה</h2>
              <p>אפשר לפתוח את הקובץ החדש ב־Google Sheets.</p>
            </div>

            <a
              href="${escapeAttribute(sheetUrl)}"
              target="_blank"
              rel="noopener noreferrer"
              class="sheet-link"
            >
              פתח את הגיליון
            </a>
          </div>
        </div>
      `;
    }

    function buildPreviewTable(csvData) {
      const rows = parseCsv(csvData);

      if (!rows.length) {
        previewTable.innerHTML = "";
        return;
      }

      const previewRows = rows.slice(0, 7);
      const header = previewRows[0];
      const bodyRows = previewRows.slice(1);

      const headerHtml = header
        .map(cell => `<th>${escapeHtml(cell)}</th>`)
        .join("");

      const bodyHtml = bodyRows
        .map(row => {
          const cells = header
            .map((_, cellIndex) => {
              const cell = row[cellIndex] || "";
              return `<td>${escapeHtml(cell)}</td>`;
            })
            .join("");

          return `<tr>${cells}</tr>`;
        })
        .join("");

      previewTable.innerHTML = `
        <div class="table-card">
          <div class="table-header">
            <div>
              <h2>תצוגה מקדימה</h2>
              <p>מוצגות עד 6 השורות הראשונות מתוך הנתונים.</p>
            </div>

            <div class="rows-pill">
              ${rows.length - 1} שורות נתונים
            </div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>${headerHtml}</tr>
              </thead>
              <tbody>${bodyHtml}</tbody>
            </table>
          </div>
        </div>
      `;
    }

    function parseCsv(csvText) {
      const rows = [];
      let row = [];
      let cell = "";
      let insideQuotes = false;

      for (let i = 0; i < csvText.length; i++) {
        const char = csvText[i];
        const nextChar = csvText[i + 1];

        if (char === '"' && insideQuotes && nextChar === '"') {
          cell += '"';
          i++;
          continue;
        }

        if (char === '"') {
          insideQuotes = !insideQuotes;
          continue;
        }

        if (char === "," && !insideQuotes) {
          row.push(cell);
          cell = "";
          continue;
        }

        if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (char === "\r" && nextChar === "\n") {
            i++;
          }

          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
          continue;
        }

        cell += char;
      }

      if (cell || row.length) {
        row.push(cell);
        rows.push(row);
      }

      return rows.filter(currentRow => currentRow.some(currentCell => currentCell !== ""));
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replaceAll("`", "&#096;");
    }
  </script>
</body>
</html>
